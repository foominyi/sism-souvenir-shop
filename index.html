<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 0;
}

h2, p {
  margin: 10px;
}

ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #74bef7;
}

li {
  float: left;
}

li a, .dropbtn {
  display: inline-block;
  color: rgb(225, 226, 176);
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

li a:hover, .dropdown:hover .dropbtn {
  background-color: rgb(219, 157, 181);
}

li.dropdown {
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #e2a3a3;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  color: rgb(233, 149, 188);
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.dropdown-content a:hover {background-color: #8b0448;}

.dropdown:hover .dropdown-content {
  display: block;
}

img {
  display: block;
  margin: 0 auto;
}

/* wrapper ensures centering context; vertical centering can be added if needed */
.image-wrapper {
  text-align: center; /* redundant with img rule but helpful for inline elements */
  /* height: 100vh; display: flex; align-items: center; justify-content: center; */
}
</style>
</head>
<body>

<ul>
  <li><a href="#home">SISM-Souvenir shop</a></li>
  <li><a href="#news">Souvenir shop workers</a></li>
  <li class="Dropdown">
    <a href="javascript:void(0)" class="dropbtn">Dropdown</a>
    <div class="Product-content">
      <a href="#">Attire</a>
      <a href="#">Stationary</a>
      <a href="#">Accessories</a>
      <a href="#">Daily product</a>
    </div>
  </li>
</ul>
<img src="1."jpg" alt="SISM-Souvenir shop" width="500" height="600">



</body>
</html>
